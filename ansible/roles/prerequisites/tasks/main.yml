---
- name: 시스템 패키지 업데이트 및 필수 도구 설치
  apt:
    name:
      - curl
      - git
      - apt-transport-https
      - python3.10-venv
      - python3-pip
    state: present
    update_cache: yes

- name: Helm 설치
  shell: |
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  args:
    creates: /usr/local/bin/helm

# --- Node.js 20.x 설치 섹션 시작 ---
- name: NodeSource 20.x 공식 설정 스크립트 실행 
  ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list 

- name: Node.js 20.x 최신 버전으로 강제 설치 및 업데이트
  ansible.builtin.apt:
    name: nodejs
    state: latest    
    update_cache: yes

# --- Buildkitd 설치 섹션 시작 ---
- name: Helm 설치
  shell: |
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  args:
    creates: /usr/local/bin/helm
- name: BuildKit | Download and extract binaries
  ansible.builtin.unarchive:
    src: "https://github.com/moby/buildkit/releases/download/{{ buildkit_version }}/buildkit-{{ buildkit_version }}.linux-{{ buildkit_arch }}.tar.gz"
    dest: /usr/local/bin/ 
    remote_src: yes
    extra_opts:
      - --strip-components=1

- name: BuildKit | Verify buildctl is installed
  ansible.builtin.command: /usr/local/bin/buildctl --version
  register: buildctl_version
  changed_when: false

- name: BuildKit | Ensure /etc/buildkit directory exists
  ansible.builtin.file:
    path: /etc/buildkit
    state: directory
    mode: '0755'

- name: BuildKit | Configure buildkitd.toml to use containerd worker
  ansible.builtin.copy:
    dest: /etc/buildkit/buildkitd.toml
    content: |
      [worker.oci]
        enabled = false
      [worker.containerd]
        enabled = true
        address = "/run/k3s/containerd/containerd.sock"
        namespace = "k8s.io"
    mode: '0644'

- name: BuildKit | Create systemd service file
  ansible.builtin.copy:
    dest: /etc/systemd/system/buildkit.service
    content: |
      [Unit]
      Description=BuildKit
      Requires=buildkit.socket
      After=buildkit.socket containerd.service
      
      [Service]
      ExecStart=/usr/local/bin/buildkitd --config /etc/buildkit/buildkitd.toml
      
      [Install]
      WantedBy=multi-user.target
    mode: '0644'

- name: BuildKit | Create systemd socket file
  ansible.builtin.copy:
    dest: /etc/systemd/system/buildkit.socket
    content: |
      [Unit]
      Description=BuildKit
      
      [Socket]
      ListenStream=%t/buildkit/buildkitd.sock
      
      [Install]
      WantedBy=sockets.target
    mode: '0644'

- name: BuildKit | Reload systemd, enable and start socket and service
  ansible.builtin.systemd:
    daemon_reload: yes
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - buildkit.socket
    - buildkit.service

- name: K8s Ansible 모듈을 위한 Python 패키지 설치
  ansible.builtin.pip:
    name:
      - kubernetes
      - PyYAML
    executable: pip3
    state: present

- name: kubernetes.core Ansible 컬렉션 설치
  ansible.builtin.command: ansible-galaxy collection install kubernetes.core
  register: galaxy_install
  changed_when: "'was installed successfully' in galaxy_install.stdout"