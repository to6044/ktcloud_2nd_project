---
# 1. K8s 모듈로 네임스페이스 생성
- name: Ensure ktcloud7 namespace exists
  become: yes 
  kubernetes.core.k8s:
    name: ktcloud7
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: /home/jazzfact/.kube/config

# 2. Helm Chart 템플릿 폴더를 타겟 노드의 임시 경로로 복사
- name: Copy app-chart to target node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../application/app-chart/"
    dest: /tmp/app-chart/
    mode: '0755'

# 3. Helm 모듈로 앱 배포 (알아서 설치/업데이트 판단)
- name: Deploy application via Helm module
  kubernetes.core.helm:
    name: my-app
    chart_ref: /tmp/app-chart
    release_namespace: ktcloud7
    state: present
    values_files:
      - /tmp/app-chart/values.yaml
    kubeconfig: /home/jazzfact/.kube/config
    wait: true
    atomic: true 
    force: true 
    replace: false